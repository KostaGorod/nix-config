name: Nix Checks

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: nix-checks-${{ github.ref }}
  cancel-in-progress: true

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: cachix/install-nix-action@v27
        with:
          extra_nix_config: |
            experimental-features = nix-command flakes

      - name: Flake check (eval + treefmt)
        run: nix flake check --show-trace

      - name: Build rocinante
        run: nix build .#checks.x86_64-linux.rocinante-toplevel --print-build-logs

  format:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: cachix/install-nix-action@v27
        with:
          extra_nix_config: |
            experimental-features = nix-command flakes

      - name: Verify treefmt
        run: nix build .#checks.x86_64-linux.treefmt --print-build-logs
